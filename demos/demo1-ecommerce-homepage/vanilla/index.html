<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>电商平台首页 - Vanilla</title>

  <!-- 问题3解决方案：首屏关键 CSS 内联 -->
  <style>
    /* 基础重置 - 必须内联 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Header - 首屏立即可见 */
    .header {
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 24px;
      color: #ff6b6b;
    }

    .nav {
      display: flex;
      gap: 24px;
    }

    .nav a {
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    /* Main - 首屏结构 */
    .main {
      min-height: calc(100vh - 160px);
    }

    /* Banner - 首屏可见 */
    .banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 80px 20px;
      text-align: center;
    }

    .banner h2 {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .banner p {
      font-size: 18px;
      opacity: 0.9;
    }

    /* Footer - 首屏可见 */
    .footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    /* Products - 首屏需要 */
    .products {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .products h3 {
      font-size: 24px;
      margin-bottom: 24px;
    }

    /* Product Card - 首屏需要 */
    .product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 16px;
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: #f5f5f5;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .product-title {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .product-price {
      color: #ff6b6b;
      font-size: 20px;
      font-weight: bold;
    }
  </style>

  <!-- 非关键 CSS 外部加载 -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container">
        <h1 class="logo">电商平台</h1>
        <nav class="nav">
          <a href="#">首页</a>
          <a href="#">商品分类</a>
          <a href="#">购物车</a>
          <a href="#">我的</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <section class="banner">
        <div class="banner-content">
          <h2>精选商品</h2>
          <p>优质商品等你来选</p>
        </div>
      </section>

      <section class="products">
        <h3>热门商品</h3>
        <div id="product-list" class="product-list">
          <!-- 商品列表将通过 JS 动态渲染 -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy; 2024 电商平台 - 性能优化演示</p>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
