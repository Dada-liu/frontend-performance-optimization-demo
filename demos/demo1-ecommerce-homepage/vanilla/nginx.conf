server {
    listen 80;
    server_name localhost;

    # 站点根目录
    root /Users/yuliu/Desktop/daxia/code/claude-performance-optimization-demo/demos/demo1-ecommerce-homepage/vanilla;
    index index.html;

    # 访问日志
    access_log /var/log/nginx/ecommerce-vanilla.access.log;
    error_log /var/log/nginx/ecommerce-vanilla.error.log;

    # 开启 gzip（对图片效果有限，但对 HTML/CSS/JS 有效）
    # Gzip 压缩配置
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;          # 压缩率 1-9，6 是性价比最高
    gzip_types                  # 要压缩的文件类型
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;
    gzip_min_length 1k;         # 小于1k不压缩
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    # 静态资源缓存配置
    # HTML 不缓存（开发时）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 图片缓存 30 天
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # CSS/JS 缓存 1 年（带 hash 的文件）
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # 所有其他静态文件
    location / {
        try_files $uri $uri/ =404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
